<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FAQ Document</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #525659; /* Classic document viewer grey */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        img { 
            width: 100%; 
            max-width: 900px; /* Keeps it readable on desktop */
            margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        /* Optional: Add padding to the top of the first page */
        img:first-child { margin-top: 20px; }
    </style>
</head>
<body>
    <!-- Add an <img> tag for every page of your document -->
    <img src="Slide1.JPG" alt="Page 1">
</body>
</html>
